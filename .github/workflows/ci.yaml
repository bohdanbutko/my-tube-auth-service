name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Build Docker image
        run: docker build -t my-tube-auth-service .

      - name: Save Docker image as artifact
        run: docker save my-tube-auth-service > my-tube-auth-service.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-tube-auth-service-image
          path: my-tube-auth-service.tar
          retention-days: 3

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: my-tube-auth-service-image

      - name: Load Docker image
        run: docker load < my-tube-auth-service.tar

      - name: Run tests in container
        run: docker run --rm -v "$PWD:/app" -w /app my-tube-auth-service uv run --frozen --group dev pytest tests
